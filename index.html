<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mope Store</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#fff;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

h1 { margin:0; }

/* HERO */
.hero {
    text-align:center;
    padding:30px;
}

/* PRODUCT */
.product {
    background:white;
    width:250px;
    margin:20px auto;
    padding:20px;
    text-align:center;
    border:1px solid #ddd;
}

button {
    padding:10px;
    border:none;
    background:#ffa41c;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}

/* STEP BOX */
.popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border:1px solid #ccc;
    width:300px;
    text-align:center;
}

/* PLATFORM */
.platform {
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.platform img {
    width:60px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>Mope Script Store</h1>
</header>

<div class="hero">
    <h2>Private Script</h2>
    <p>Fast • Clean • Safe</p>
</div>

<div class="product">
    <h3>Mope.io Script</h3>
    <p style="color:#b12704;"><b>$5</b></p>
    <button onclick="openPlatform()">Select</button>
</div>

<!-- STEP 1: SELECT PLATFORM -->
<div id="platformBox" class="popup">
    <h3>Select Platform</h3>

    <div class="platform">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" onclick="selectPlatform('iOS')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg" onclick="selectPlatform('Android')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnxikKQq4AcCyt2KlJs3BzkDx84SEkxylVFkcuEG9Rfw&s=10" onclick="selectPlatform('Computer')">
    </div>

    <br>
    <button onclick="closePlatform()">Close</button>
</div>

<!-- STEP 2: PAYMENT -->
<div id="paymentBox" class="popup">
    <h3 id="deviceTitle"></h3>

    <button onclick="pay('paypal')">PayPal</button>
    <button onclick="pay('usdt')">USDT (BEP20)</button>
    <button onclick="pay('wise')">Wise</button>

    <br><br>
    <button onclick="closePayment()">Close</button>
</div>

<!-- USDT -->
<div id="cryptoBox" class="popup">
    <h3>USDT (BEP20)</h3>
    <p>Network: BSC</p>

    <input value="YOUR_WALLET_ADDRESS" readonly>

    <p style="color:red;">Send ONLY BEP20</p>

    <button onclick="closeCrypto()">Close</button>
</div>

<script>

let selectedDevice = "";

function openPlatform(){
    document.getElementById("platformBox").style.display = "block";
}

function closePlatform(){
    document.getElementById("platformBox").style.display = "none";
}

function selectPlatform(device){
    selectedDevice = device;
    document.getElementById("platformBox").style.display = "none";

    document.getElementById("deviceTitle").innerText = "Payment for " + device;
    document.getElementById("paymentBox").style.display = "block";
}

function closePayment(){
    document.getElementById("paymentBox").style.display = "none";
}

function pay(method){

    if(method === "paypal"){
        window.location.href = "https://paypal.me/YOURNAME";
    }

    if(method === "usdt"){
        document.getElementById("paymentBox").style.display = "none";
        document.getElementById("cryptoBox").style.display = "block";
    }

    if(method === "wise"){
        alert("Send via Wise to: YOUR_EMAIL");
    }
}

function closeCrypto(){
    document.getElementById("cryptoBox").style.display = "none";
}

</script>

</body>
</html>
