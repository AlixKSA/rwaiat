<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة اختبار الإعلانات المتقدمة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="test-wrapper">
        <header>
            <div class="status-dot"></div>
            <h1>نظام التحقق من الإعلانات v1.0</h1>
            <p id="timer">جاري المراقبة: <span id="clock">00:00:00</span></p>
        </header>

        <section class="ad-test-zone">
            <div class="zone-label">منطقة العرض (Adaptive Ad Unit)</div>
            
            <div id="frame" style="width: 100%; margin: auto; position: relative; z-index: 99998;">
                <iframe data-aa='2431921' src='//acceptable.a-ads.com/2431921/?size=Adaptive'
                        style='border:0; padding:0; width:100%; height:250px; overflow:hidden; display: block; margin: auto'></iframe>
            </div>
            </section>

        <footer>
            <button onclick="location.reload()" class="refresh-btn">تحديث الصفحة للاختبار</button>
            <p>ملاحظة: سيتم تحديث الإحصائيات في A-ADS خلال 24 ساعة.</p>
        </footer>
    </div>

    <script>
        // سكربت بسيط لعرض عداد الوقت لتعرف منذ متى الصفحة مفتوحة
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
