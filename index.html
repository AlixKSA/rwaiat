<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mope Script Store</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#ffffff;
    padding:15px 30px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

h1 { margin:0; }

/* HERO */
.hero {
    padding:30px;
    background:white;
    text-align:center;
}

/* CARDS */
.container {
    padding:30px;
}

.platforms {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    width:220px;
    padding:20px;
    text-align:center;
    transition:0.2s;
}

.card:hover {
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width:80px;
    margin-bottom:15px;
}

.price {
    color:#b12704;
    font-weight:bold;
}

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff9900;
    cursor:pointer;
}

/* POPUPS */
.popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
    border:1px solid #ccc;
    text-align:center;
}
</style>
</head>

<body>

<header>
    <h1>Mope Script Store</h1>
</header>

<div class="hero">
    <h2>Choose Your Platform</h2>
</div>

<div class="container">

    <div class="platforms">

        <!-- iOS -->
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
            <h3>iOS</h3>
            <p class="price">$5</p>
            <button onclick="openPayment('iOS')">Select</button>
        </div>

        <!-- Android -->
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">
            <h3>Android</h3>
            <p class="price">$5</p>
            <button onclick="openPayment('Android')">Select</button>
        </div>

        <!-- Computer -->
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnxikKQq4AcCyt2KlJs3BzkDx84SEkxylVFkcuEG9Rfw&s=10">
            <h3>Computer</h3>
            <p class="price">$5</p>
            <button onclick="openPayment('Computer')">Select</button>
        </div>

    </div>

</div>

<!-- PAYMENT -->
<div id="paymentBox" class="popup">
    <h3 id="title"></h3>

    <button onclick="pay('paypal')">PayPal</button>
    <button onclick="pay('usdt')">USDT (BEP20)</button>
    <button onclick="pay('wise')">Wise</button>

    <br><br>
    <button onclick="closePayment()">Close</button>
</div>

<!-- CRYPTO -->
<div id="cryptoBox" class="popup">
    <h3>USDT (BEP20)</h3>
    <p>Network: BSC</p>

    <input value="YOUR_WALLET_ADDRESS" readonly>

    <p style="color:red;">Send ONLY BEP20</p>

    <button onclick="closeCrypto()">Close</button>
</div>

<script>

let device = "";

function openPayment(selected){
    device = selected;
    document.getElementById("title").innerText = "Payment for " + device;
    document.getElementById("paymentBox").style.display = "block";
}

function closePayment(){
    document.getElementById("paymentBox").style.display = "none";
}

function pay(method){

    if(method === "paypal"){
        window.location.href = "https://paypal.me/YOURNAME";
    }

    if(method === "usdt"){
        document.getElementById("paymentBox").style.display = "none";
        document.getElementById("cryptoBox").style.display = "block";
    }

    if(method === "wise"){
        alert("Send via Wise to: YOUR_EMAIL");
    }
}

function closeCrypto(){
    document.getElementById("cryptoBox").style.display = "none";
}

</script>

</body>
</html>
