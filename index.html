<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mope.io Script Store</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0c0c0e;
    color:white;
}

/* HEADER */
header {
    text-align:center;
    padding:40px;
    background:#111;
    border-bottom:2px solid red;
}

h1 { color:red; }

/* SECTION */
.container {
    padding:40px;
    text-align:center;
}

/* CARDS */
.platforms {
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card {
    background:#1a1a1d;
    padding:20px;
    border-radius:15px;
    width:220px;
    transition:0.3s;
    border:1px solid #333;
}

.card:hover {
    transform:scale(1.05);
    border-color:red;
}

.card img {
    width:100px;
    margin-bottom:10px;
}

button {
    padding:10px;
    width:100%;
    border:none;
    background:red;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* PAYMENT MODAL */
#paymentBox, #cryptoBox {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:20px;
    border-radius:15px;
    width:300px;
    border:1px solid red;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
    border-top:1px solid #222;
    margin-top:50px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>Mope.io Script Store</h1>
    <p>Private & Powerful Scripts</p>
</header>

<div class="container">

    <h2>Select Your Platform</h2>

    <div class="platforms">

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png">
            <h3>iOS</h3>
            <button onclick="openPayment()">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
            <h3>Android</h3>
            <button onclick="openPayment()">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
            <h3>Computer</h3>
            <button onclick="openPayment()">Buy Now</button>
        </div>

    </div>

</div>

<!-- PAYMENT BOX -->
<div id="paymentBox">
    <h3>Select Payment</h3>

    <button onclick="pay('paypal')">PayPal</button>
    <button onclick="pay('usdt')">USDT (BEP20)</button>
    <button onclick="pay('wise')">Wise</button>

    <br><br>
    <button onclick="closePayment()">Close</button>
</div>

<!-- USDT BOX -->
<div id="cryptoBox">
    <h3>USDT (BEP20)</h3>

    <p><b>Network:</b> BSC (BEP20)</p>

    <input id="wallet" value="YOUR_WALLET_ADDRESS" readonly>

    <p style="color:red;">⚠️ Send ONLY BEP20</p>

    <button onclick="copyAddress()">Copy</button>
    <button onclick="closeCrypto()">Close</button>
</div>

<footer>
    © 2026 Mope Script Store
</footer>

<script>

function openPayment(){
    document.getElementById("paymentBox").style.display = "block";
}

function closePayment(){
    document.getElementById("paymentBox").style.display = "none";
}

function pay(method){

    if(method === "paypal"){
        window.location.href = "https://paypal.me/YOURNAME";
    }

    if(method === "usdt"){
        document.getElementById("paymentBox").style.display = "none";
        document.getElementById("cryptoBox").style.display = "block";
    }

    if(method === "wise"){
        alert("Send via Wise to: YOUR_EMAIL");
    }

}

function closeCrypto(){
    document.getElementById("cryptoBox").style.display = "none";
}

function copyAddress(){
    let text = document.getElementById("wallet").value;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

</script>

</body>
</html>
