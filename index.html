<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mope Script Store</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#fff;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* VIDEO */
.video {
    text-align:center;
    padding:20px;
    background:white;
}

.video iframe {
    width:90%;
    max-width:800px;
    height:400px;
    border:none;
}

/* CARDS */
.container {
    padding:30px;
}

.platforms {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    width:220px;
    padding:20px;
    text-align:center;
}

.card img {
    width:80px;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#ffa41c;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* PAYMENT PAGE */
#paymentPage {
    display:none;
    text-align:center;
    padding:30px;
}

.pay-options {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.pay-card {
    background:white;
    border:1px solid #ddd;
    padding:15px;
    width:150px;
    text-align:center;
}

.pay-card img {
    width:60px;
}
</style>
</head>

<body>

<header>
    <h1>Mope Script Store</h1>
</header>

<!-- VIDEO -->
<div class="video">
    <iframe src="https://www.youtube.com/embed/X56Y64Lr3mg"></iframe>
</div>

<!-- MAIN STORE -->
<div id="mainPage">

<div class="container">
    <div class="platforms">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
            <h3>iOS</h3>
            <button onclick="goPay('iOS','https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg')">Select</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">
            <h3>Android</h3>
            <button onclick="goPay('Android','https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg')">Select</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1006/1006363.png">
            <h3>Computer</h3>
            <button onclick="goPay('Computer','https://cdn-icons-png.flaticon.com/512/1006/1006363.png')">Select</button>
        </div>

    </div>
</div>

</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">

    <h2 id="deviceName"></h2>
    <img id="deviceImg" style="width:80px;">

    <h3>Choose Payment Method</h3>

    <div class="pay-options">

        <!-- PayPal -->
        <div class="pay-card">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196566.png">
            <p>PayPal</p>
            <button onclick="pay('paypal')">Pay</button>
        </div>

        <!-- USDT -->
        <div class="pay-card">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
            <p>USDT</p>
            <button onclick="pay('usdt')">Pay</button>
        </div>

        <!-- Wise -->
        <div class="pay-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Wise_logo.svg">
            <p>Wise</p>
            <button onclick="pay('wise')">Pay</button>
        </div>

    </div>

    <br><br>
    <button onclick="back()">⬅ Back</button>

</div>

<script>

function goPay(name, img){
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("paymentPage").style.display = "block";

    document.getElementById("deviceName").innerText = name;
    document.getElementById("deviceImg").src = img;
}

function back(){
    document.getElementById("paymentPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

function pay(method){

    if(method === "paypal"){
        window.location.href = "https://paypal.me/YOURNAME";
    }

    if(method === "usdt"){
        alert("Send USDT (BEP20)\nYOUR_WALLET_ADDRESS");
    }

    if(method === "wise"){
        alert("Wise: YOUR_EMAIL");
    }

}

</script>

</body>
</html>
