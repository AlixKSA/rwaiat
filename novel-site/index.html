<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowVerse Novels</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">ShadowVerse</div>

    <div class="coins-box">
        💰 Coins: <span id="coins">120</span>
    </div>
</header>

<section class="hero">
    <h1>Epic Web Novels</h1>
    <p>Read fantasy, action, system & reincarnation stories</p>
</section>

<section class="novels">

    <div class="novel-card">
        <img src="https://picsum.photos/300/400?1">

        <div class="novel-info">
            <h2>Void King</h2>

            <div class="tags">
                <span class="tag">Fantasy</span>
                <span class="tag">Action</span>
                <span class="tag">System</span>
            </div>

            <p class="novel-desc">
                A world collapses after gates open between dimensions.
            </p>

            <div class="novel-stats">
                <span>⭐ 4.9</span>
                <span>📖 10</span>
                <span>👁 120K</span>
            </div>

            <a class="read-btn" href="novel.html">READ NOW</a>

            <div class="chapters-preview">

                <div class="chapter-title">Latest Chapters</div>

                <div class="mini-chapter">
                    <span>Chapter 10</span>
                    <span class="locked">🔒 50 Coins</span>
                </div>

                <div class="mini-chapter">
                    <span>Chapter 9</span>
                    <span class="locked">🔒 50 Coins</span>
                </div>

                <div class="mini-chapter">
                    <span>Chapter 8</span>
                    <span class="locked">🔒 50 Coins</span>
                </div>

            </div>

        </div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
