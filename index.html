<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mope Script Store</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    color:#111;
}

/* HEADER */
header {
    background:#ffffff;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
}

.logo {
    font-size:22px;
    font-weight:bold;
}

.buy-btn {
    background:#ff9900;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* HERO */
.hero {
    padding:40px;
    background:white;
    text-align:center;
}

.hero h1 {
    margin:0;
}

/* CARDS */
.container {
    padding:30px;
}

.platforms {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    width:220px;
    padding:20px;
    text-align:center;
    transition:0.2s;
}

.card:hover {
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width:80px;
    margin-bottom:15px;
}

.price {
    color:#b12704;
    font-weight:bold;
}

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff9900;
    cursor:pointer;
}

/* PAYMENT MODAL */
#paymentBox, #cryptoBox {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
    border:1px solid #ccc;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
    color:#666;
}
</style>
</head>

<body>

<header>
    <div class="logo">Mope Script Store</div>
    <button class="buy-btn" onclick="openPayment()">Buy Now</button>
</header>

<div class="hero">
    <h1>Best Private Scripts for Mope.io</h1>
    <p>Fast • Safe • Powerful</p>
</div>

<div class="container">

    <h2 style="text-align:center;">Choose Platform</h2>

    <div class="platforms">

        <!-- iOS -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
            <h3>iOS</h3>
            <p class="price">$5</p>
            <button onclick="openPayment()">Buy Now</button>
        </div>

        <!-- Android -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png">
            <h3>Android</h3>
            <p class="price">$5</p>
            <button onclick="openPayment()">Buy Now</button>
        </div>

        <!-- Computer -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2920/2920244.png">
            <h3>Computer</h3>
            <p class="price">$5</p>
            <button onclick="openPayment()">Buy Now</button>
        </div>

    </div>

</div>

<!-- PAYMENT BOX -->
<div id="paymentBox">
    <h3>Select Payment Method</h3>

    <button onclick="pay('paypal')">PayPal</button>
    <button onclick="pay('usdt')">USDT (BEP20)</button>
    <button onclick="pay('wise')">Wise</button>

    <br><br>
    <button onclick="closePayment()">Close</button>
</div>

<!-- CRYPTO BOX -->
<div id="cryptoBox">
    <h3>USDT (BEP20)</h3>

    <p><b>Network:</b> BSC</p>

    <input id="wallet" value="YOUR_WALLET_ADDRESS" readonly>

    <p style="color:red;">Send ONLY BEP20</p>

    <button onclick="copyAddress()">Copy</button>
    <button onclick="closeCrypto()">Close</button>
</div>

<footer>
    © 2026 Mope Script Store
</footer>

<script>

function openPayment(){
    document.getElementById("paymentBox").style.display = "block";
}

function closePayment(){
    document.getElementById("paymentBox").style.display = "none";
}

function pay(method){

    if(method === "paypal"){
        window.location.href = "https://paypal.me/YOURNAME";
    }

    if(method === "usdt"){
        document.getElementById("paymentBox").style.display = "none";
        document.getElementById("cryptoBox").style.display = "block";
    }

    if(method === "wise"){
        alert("Send via Wise to: YOUR_EMAIL");
    }

}

function closeCrypto(){
    document.getElementById("cryptoBox").style.display = "none";
}

function copyAddress(){
    let text = document.getElementById("wallet").value;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

</script>

</body>
</html>
